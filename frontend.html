<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Estética | Painel Administrativo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- ECRÃ DE LOGIN -->
    <div id="login-view" class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h2 class="text-2xl font-bold text-center text-pink-600 mb-6">Aura Estética</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Utilizador</label>
                    <input type="text" id="username" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:border-pink-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Palavra-passe</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border rounded-md focus:outline-none focus:border-pink-500" required>
                </div>
                <button type="submit" class="w-full bg-pink-600 text-white font-bold py-2 rounded-md hover:bg-pink-700 transition">Entrar</button>
                <p id="login-error" class="text-red-500 text-sm mt-3 hidden">Credenciais inválidas.</p>
            </form>
        </div>
    </div>

    <!-- DASHBOARD PRINCIPAL -->
    <div id="dashboard-view" class="hidden flex flex-col min-h-screen">
        <!-- Topbar -->
        <header class="bg-pink-600 text-white p-4 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">Painel Aura Estética</h1>
            <button id="btn-logout" class="bg-pink-800 px-4 py-2 rounded text-sm hover:bg-pink-900">Terminar Sessão</button>
        </header>

        <main class="flex-grow p-6 flex gap-6 flex-col lg:flex-row">
            
            <!-- Agendamentos -->
            <section class="flex-1 bg-white rounded-lg shadow p-4">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Agendamentos Recentes</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-sm">
                                <th class="p-3 border-b">Cliente</th>
                                <th class="p-3 border-b">Telefone</th>
                                <th class="p-3 border-b">Serviço</th>
                                <th class="p-3 border-b">Data/Hora</th>
                                <th class="p-3 border-b">Status</th>
                                <th class="p-3 border-b">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-agendamentos">
                            <!-- Injetado via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Logs de Conversa -->
            <section class="flex-1 bg-white rounded-lg shadow p-4 lg:max-w-md">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Auditoria de Bot (Logs)</h2>
                <div id="lista-logs" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                    <!-- Injetado via JS -->
                </div>
            </section>

        </main>
    </div>

    <!-- LÓGICA JAVASCRIPT (FETCH) -->
    <script>
        // Atenção: Substitua por sua URL do Render no momento do deploy ex: 'https://aura-api.onrender.com'
        const API_BASE_URL = "https://congenial-guide-lp8d.onrender.com/api"; 
        
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        
        // Verifica Sessão
        if(localStorage.getItem('aura_token')) {
            showDashboard();
        }

        // Login Submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('aura_token', data.token);
                    document.getElementById('login-error').classList.add('hidden');
                    showDashboard();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch(err) {
                console.error("Erro no login:", err);
            }
        });

        // Logout
        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('aura_token');
            dashboardView.classList.add('hidden');
            loginView.classList.remove('hidden');
        });

        function showDashboard() {
            loginView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            carregarAgendamentos();
            carregarLogs();
        }

        // Fetch Agendamentos
        async function carregarAgendamentos() {
            const res = await fetch(`${API_BASE_URL}/agendamentos`);
            const data = await res.json();
            const tbody = document.getElementById('tabela-agendamentos');
            tbody.innerHTML = '';

            data.agendamentos.forEach(ag => {
                let badgeClass = ag.status === 'Confirmado' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';
                
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-3 font-semibold">${ag.nome_cliente}</td>
                    <td class="p-3">${ag.telefone_cliente}</td>
                    <td class="p-3">${ag.servico}</td>
                    <td class="p-3">${ag.data_hora}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badgeClass}">${ag.status}</span></td>
                    <td class="p-3 flex gap-2">
                        <button onclick="alterarStatus('${ag._id}', 'Confirmado')" class="text-green-600 hover:underline">Confirmar</button>
                        <button onclick="alterarStatus('${ag._id}', 'Cancelado')" class="text-red-600 hover:underline">Cancelar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Alterar Status (PATCH)
        async function alterarStatus(id, novoStatus) {
            await fetch(`${API_BASE_URL}/agendamentos/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: novoStatus })
            });
            carregarAgendamentos(); // Refresh da tabela
        }

        // Fetch Logs de Chat
        async function carregarLogs() {
            const res = await fetch(`${API_BASE_URL}/logs`);
            const data = await res.json();
            const divLogs = document.getElementById('lista-logs');
            divLogs.innerHTML = '';

            data.logs.forEach(log => {
                const item = document.createElement('div');
                item.className = "bg-gray-50 p-3 rounded border text-sm";
                item.innerHTML = `
                    <div class="flex justify-between text-xs text-gray-500 mb-2">
                        <span>📱 ${log.telefone}</span>
                    </div>
                    <p class="mb-1"><strong class="text-gray-700">Cliente:</strong> ${log.mensagem_cliente}</p>
                    <p><strong class="text-pink-600">IA:</strong> ${log.resposta_ia}</p>
                `;
                divLogs.appendChild(item);
            });
        }
        
        // Atualiza a cada 30 segundos
        setInterval(() => {
            if(!dashboardView.classList.contains('hidden')) {
                carregarAgendamentos();
                carregarLogs();
            }
        }, 30000);

    </script>
</body>
</html>
