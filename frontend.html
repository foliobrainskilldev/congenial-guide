<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Esthetics | CRM & Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .hidden { display: none !important; } </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- LOGIN SCREEN -->
    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-extrabold text-center text-pink-600 mb-6">Aura Esthetics CRM</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-pink-500 outline-none" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-pink-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-pink-600 text-white font-bold py-2 rounded-md hover:bg-pink-700 transition">Access CRM</button>
                <p id="login-error" class="text-red-500 text-sm mt-3 hidden text-center">Invalid credentials.</p>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-view" class="hidden flex flex-col h-screen">
        <!-- Navbar -->
        <header class="bg-pink-600 text-white p-4 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">💎 Aura Dashboard & Live Chat</h1>
            <button id="btn-logout" class="bg-pink-800 px-4 py-2 rounded-lg text-sm hover:bg-pink-900 transition">Logout</button>
        </header>

        <main class="flex-grow p-4 flex gap-4 overflow-hidden">
            
            <!-- APPOINTMENTS COLUMN -->
            <section class="w-2/3 bg-white rounded-lg shadow-lg flex flex-col overflow-hidden">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h2 class="text-lg font-bold">📅 Recent Appointments</h2>
                    <button onclick="loadAppointments()" class="text-sm bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">↻ Refresh</button>
                </div>
                <div class="overflow-y-auto flex-grow p-4">
                    <table class="min-w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-sm text-gray-600">
                                <th class="p-3 border-b">Client</th>
                                <th class="p-3 border-b">Phone</th>
                                <th class="p-3 border-b">Service</th>
                                <th class="p-3 border-b">Date/Time</th>
                                <th class="p-3 border-b">Status</th>
                            </tr>
                        </thead>
                        <tbody id="appointments-table"></tbody>
                    </table>
                </div>
            </section>

            <!-- LIVE CHAT COLUMN -->
            <section class="w-1/3 bg-white rounded-lg shadow-lg flex flex-col overflow-hidden border border-pink-100">
                <div class="p-4 border-b bg-pink-50 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-pink-800">💬 Live WhatsApp Monitor</h2>
                    <span id="ws-status" class="text-xs font-bold text-green-600">● Online</span>
                </div>
                
                <!-- Chat History Window -->
                <div id="chat-window" class="flex-grow p-4 overflow-y-auto bg-gray-50 space-y-3">
                    <div class="text-center text-xs text-gray-400">Waiting for live messages...</div>
                </div>

                <!-- Admin Reply Input -->
                <div class="p-3 border-t bg-white">
                    <form id="reply-form" class="flex gap-2">
                        <input type="text" id="target-phone" placeholder="Phone (e.g. 3519...)" class="w-1/3 px-2 py-2 border rounded text-xs outline-none focus:border-pink-500" required>
                        <input type="text" id="reply-text" placeholder="Type your reply here..." class="w-2/3 px-3 py-2 border rounded text-sm outline-none focus:border-pink-500" required>
                        <button type="submit" class="bg-pink-600 text-white px-4 py-2 rounded hover:bg-pink-700 font-bold">→</button>
                    </form>
                </div>
            </section>

        </main>
    </div>

    <!-- APP LOGIC -->
    <script>
        const API_URL = "http://localhost:10000/api"; 
        const WS_URL = "ws://localhost:10000/ws/admin"; // Change to wss://your-render-url for production

        let socket;

        if(localStorage.getItem('aura_token')) showDashboard();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: document.getElementById('username').value, 
                    password: document.getElementById('password').value 
                })
            });
            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('aura_token', data.token);
                showDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('aura_token');
            if(socket) socket.close();
            location.reload();
        });

        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('aura_token')}`
            };
        }

        function showDashboard() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            loadAppointments();
            initWebSocket();
        }

        async function loadAppointments() {
            try {
                const res = await fetch(`${API_URL}/appointments`, { headers: getAuthHeaders() });
                if(res.status === 401) return document.getElementById('btn-logout').click(); // Token expired
                
                const data = await res.json();
                const tbody = document.getElementById('appointments-table');
                tbody.innerHTML = '';
                
                data.appointments.forEach(ag => {
                    let badge = ag.status === 'Confirmed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800';
                    if (ag.status === 'Canceled') badge = 'bg-red-100 text-red-800';

                    tbody.innerHTML += `
                        <tr class="border-b text-sm hover:bg-gray-50">
                            <td class="p-3 font-semibold">${ag.client_name}</td>
                            <td class="p-3 text-pink-600 cursor-pointer" onclick="document.getElementById('target-phone').value='${ag.client_phone}'">${ag.client_phone}</td>
                            <td class="p-3">${ag.service}</td>
                            <td class="p-3">${ag.date_time}</td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${badge}">${ag.status}</span></td>
                        </tr>
                    `;
                });
            } catch(e) { console.error("Error loading appointments", e); }
        }

        function initWebSocket() {
            socket = new WebSocket(WS_URL);
            const chatWindow = document.getElementById('chat-window');
            const wsStatus = document.getElementById('ws-status');

            socket.onopen = () => wsStatus.innerHTML = "● Live Sync";
            socket.onclose = () => wsStatus.innerHTML = "○ Disconnected";

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                const isClient = msg.sender === 'client';
                const alignClass = isClient ? 'text-left' : 'text-right';
                const bgClass = isClient ? 'bg-white border text-gray-800' : 'bg-pink-100 text-pink-900';
                const senderName = isClient ? `📱 ${msg.phone}` : `🤖 AI Bot`;

                const msgDiv = document.createElement('div');
                msgDiv.className = `flex flex-col ${alignClass} mb-2`;
                msgDiv.innerHTML = `
                    <span class="text-[10px] text-gray-400 mb-1">${senderName}</span>
                    <div class="inline-block px-3 py-2 rounded-lg shadow-sm text-sm ${bgClass} max-w-[85%] ${isClient ? 'self-start' : 'self-end'}">
                        ${msg.text}
                    </div>
                `;
                chatWindow.appendChild(msgDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                
                // Auto-fill phone target if client messages
                if(isClient) document.getElementById('target-phone').value = msg.phone;
            };
        }

        document.getElementById('reply-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('target-phone').value;
            const text = document.getElementById('reply-text').value;
            if(!phone || !text || !socket) return;

            // Send via WebSocket to Backend (which routes to WhatsApp)
            socket.send(JSON.stringify({ phone: phone, text: text }));
            
            // Add to UI immediately
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML += `
                <div class="flex flex-col text-right mb-2">
                    <span class="text-[10px] text-gray-400 mb-1">👩‍💻 You (Admin)</span>
                    <div class="inline-block px-3 py-2 rounded-lg shadow-sm text-sm bg-pink-600 text-white self-end max-w-[85%]">
                        ${text}
                    </div>
                </div>
            `;
            chatWindow.scrollTop = chatWindow.scrollHeight;
            document.getElementById('reply-text').value = ''; // clear input
        });

    </script>
</body>
</html>
