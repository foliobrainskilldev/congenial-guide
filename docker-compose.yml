# docker-compose.yml
version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: aura_backend
    restart: always
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/aura_esthetics
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app # For hot-reloading in development
      - chroma_data:/app/chroma_db # Persist Vector Database

  mongodb:
    image: mongo:latest
    container_name: aura_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    container_name: aura_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
  chroma_data: